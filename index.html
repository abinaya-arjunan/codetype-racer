<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CodeType Racer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f12;
      --bg2: #151820;
      --bg3: #1c2029;
      --border: #2a2f3d;
      --green: #4ade80;
      --red: #f87171;
      --amber: #fbbf24;
      --blue: #60a5fa;
      --text: #e2e8f0;
      --muted: #64748b;
      --font-ui: 'Syne', sans-serif;
      --font-code: 'JetBrains Mono', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ---------- HEADER ---------- */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 40px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }
    .logo span { color: var(--green); }

    .difficulty-pills {
      display: flex;
      gap: 8px;
    }
    .pill {
      font-family: var(--font-ui);
      font-size: 12px;
      font-weight: 700;
      padding: 5px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: all 0.15s;
    }
    .pill:hover { border-color: var(--green); color: var(--green); }
    .pill.active { background: var(--green); border-color: var(--green); color: #0d0f12; }

    .header-right {
      display: flex;
      align-items: center;
      gap: 24px;
    }
    .restart-btn {
      font-family: var(--font-ui);
      font-size: 13px;
      font-weight: 700;
      padding: 7px 18px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg3);
      color: var(--text);
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: all 0.15s;
    }
    .restart-btn:hover { border-color: var(--blue); color: var(--blue); }

    /* ---------- STATS BAR ---------- */
    .stats-bar {
      display: flex;
      justify-content: center;
      gap: 60px;
      padding: 28px 40px;
    }
    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .stat-value {
      font-size: 36px;
      font-weight: 800;
      letter-spacing: -1px;
      color: var(--text);
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .stat-value.highlight { color: var(--green); }
    .stat-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* ---------- MAIN GAME AREA ---------- */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 40px 40px;
      max-width: 900px;
      margin: 0 auto;
      width: 100%;
    }

    /* Snippet display */
    .snippet-wrapper {
      width: 100%;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 32px 36px;
      margin-bottom: 20px;
      position: relative;
    }

    .snippet-lang-tag {
      position: absolute;
      top: 14px;
      right: 18px;
      font-family: var(--font-code);
      font-size: 11px;
      color: var(--muted);
      background: var(--bg3);
      padding: 3px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
    }

    #snippet-display {
      font-family: var(--font-code);
      font-size: 17px;
      line-height: 1.8;
      white-space: pre;
      color: var(--muted);
      overflow: hidden;
    }

    /* Individual character spans — JS will add classes */
    #snippet-display .char { transition: color 0.05s; }
    #snippet-display .char.correct { color: var(--text); }
    #snippet-display .char.wrong { color: var(--red); background: rgba(248,113,113,0.12); border-radius: 2px; }
    #snippet-display .char.cursor {
      border-left: 2px solid var(--green);
      margin-left: -1px;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { border-color: var(--green); }
      50% { border-color: transparent; }
    }

    /* Input area */
    .input-wrapper {
      width: 100%;
      position: relative;
    }

    #typing-input {
      width: 100%;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px 24px;
      font-family: var(--font-code);
      font-size: 16px;
      color: var(--text);
      outline: none;
      caret-color: var(--green);
      transition: border-color 0.2s;
      resize: none;
      height: 64px;
    }
    #typing-input:focus { border-color: var(--green); }
    #typing-input::placeholder { color: var(--muted); }

    .input-hint {
      font-size: 12px;
      color: var(--muted);
      margin-top: 10px;
      text-align: center;
      letter-spacing: 0.03em;
    }
    .input-hint kbd {
      font-family: var(--font-code);
      font-size: 11px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 6px;
    }

    /* ---------- PROGRESS BAR ---------- */
    .progress-track {
      width: 100%;
      height: 3px;
      background: var(--bg3);
      border-radius: 2px;
      margin-bottom: 20px;
    }
    #progress-fill {
      height: 100%;
      background: var(--green);
      border-radius: 2px;
      width: 0%;
      transition: width 0.1s ease;
    }

    /* ---------- RESULTS OVERLAY ---------- */
    #results-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(13,15,18,0.9);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    #results-overlay.show { display: flex; }

    .results-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 56px;
      text-align: center;
      min-width: 380px;
    }
    .results-card h2 {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 24px;
    }
    .results-wpm {
      font-size: 80px;
      font-weight: 800;
      color: var(--green);
      line-height: 1;
      letter-spacing: -3px;
    }
    .results-wpm-label {
      font-size: 14px;
      color: var(--muted);
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 28px;
    }
    .results-stats {
      display: flex;
      justify-content: center;
      gap: 40px;
      padding: 24px 0;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      margin-bottom: 28px;
    }
    .results-stat-val { font-size: 24px; font-weight: 800; color: var(--text); }
    .results-stat-lbl { font-size: 11px; color: var(--muted); font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; margin-top: 2px; }
    .results-play-btn {
      font-family: var(--font-ui);
      font-size: 14px;
      font-weight: 700;
      padding: 12px 36px;
      border-radius: 10px;
      border: none;
      background: var(--green);
      color: #0d0f12;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: opacity 0.15s;
    }
    .results-play-btn:hover { opacity: 0.85; }

    /* ---------- LEADERBOARD ---------- */
    .leaderboard {
      width: 100%;
      margin-top: 28px;
    }
    .lb-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .lb-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 14px;
      border-radius: 8px;
      background: var(--bg3);
      margin-bottom: 6px;
    }
    .lb-rank { font-size: 12px; color: var(--muted); min-width: 18px; font-weight: 700; }
    .lb-name { flex: 1; font-size: 13px; color: var(--text); font-family: var(--font-code); }
    .lb-wpm { font-size: 13px; font-weight: 700; color: var(--green); font-family: var(--font-code); }
    .lb-acc { font-size: 12px; color: var(--muted); font-family: var(--font-code); }
    .lb-empty { font-size: 12px; color: var(--muted); text-align: center; padding: 10px; }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="logo">code<span>type</span>.racer</div>

    <div class="difficulty-pills">
      <button class="pill active" data-level="easy">Easy</button>
      <button class="pill" data-level="medium">Medium</button>
      <button class="pill" data-level="hard">Hard</button>
    </div>

    <div class="header-right">
      <button class="restart-btn" id="restart-btn">↺ Restart</button>
    </div>
  </header>

  <!-- STATS BAR -->
  <div class="stats-bar">
    <div class="stat">
      <div class="stat-value highlight" id="wpm-display">0</div>
      <div class="stat-label">WPM</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="timer-display">60</div>
      <div class="stat-label">Seconds</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="accuracy-display">100%</div>
      <div class="stat-label">Accuracy</div>
    </div>
  </div>

  <!-- MAIN GAME -->
  <main>
    <div class="progress-track">
      <div id="progress-fill"></div>
    </div>

    <div class="snippet-wrapper">
      <div class="snippet-lang-tag" id="lang-tag">javascript</div>
      <div id="snippet-display">
        <!-- Snippet chars rendered here by snippets.js -->
      </div>
    </div>

    <div class="input-wrapper">
      <textarea
        id="typing-input"
        placeholder="Start typing to begin..."
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
      ></textarea>
    </div>
    <div class="input-hint">Press <kbd>Tab</kbd> to skip snippet &nbsp;·&nbsp; <kbd>Ctrl + R</kbd> to restart</div>
  </main>

  <!-- RESULTS OVERLAY -->
  <div id="results-overlay">
    <div class="results-card">
      <h2>Round complete</h2>
      <div class="results-wpm" id="final-wpm">0</div>
      <div class="results-wpm-label">words per minute</div>

      <div class="results-stats">
        <div>
          <div class="results-stat-val" id="final-acc">0%</div>
          <div class="results-stat-lbl">Accuracy</div>
        </div>
        <div>
          <div class="results-stat-val" id="final-chars">0</div>
          <div class="results-stat-lbl">Chars typed</div>
        </div>
        <div>
          <div class="results-stat-val" id="final-errors">0</div>
          <div class="results-stat-lbl">Errors</div>
        </div>
      </div>

      <button class="results-play-btn" id="play-again-btn">Play again</button>

      <!-- Leaderboard goes here (Day 4) -->
      <div class="leaderboard" id="leaderboard">
        <div class="lb-title">Top scores</div>
        <div class="lb-empty" id="lb-empty">No scores yet — play a round!</div>
      </div>
    </div>
  </div>

  <!-- JS files (wire up on Day 2+) -->
  <script src="snippets.js"></script>
  <script src="timer.js"></script>
  <script src="leaderboard.js"></script>
  <script src="app.js"></script>

</body>
</html>
