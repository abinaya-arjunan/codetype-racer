<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CodeType Racer</title>
  <meta name="description" content="A typing speed game using real code snippets. Test your coding WPM across JS, HTML and CSS."/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
 
  <!-- HEADER -->
  <header class="header">
    <div class="logo">
      <span class="logo-bracket">&lt;</span>CodeType<span class="logo-slash">/</span>Racer<span class="logo-bracket">&gt;</span>
    </div>
    <div class="difficulty-selector">
      <button class="diff-btn active" data-level="easy">Easy</button>
      <button class="diff-btn" data-level="medium">Medium</button>
      <button class="diff-btn" data-level="hard">Hard</button>
    </div>
  </header>
 
  <!-- STATS BAR -->
  <div class="stats-bar">
    <div class="stat">
      <span class="stat-value" id="wpm-display">0</span>
      <span class="stat-label">WPM</span>
    </div>
    <div class="stat">
      <span class="stat-value" id="accuracy-display">100</span>
      <span class="stat-label">ACC %</span>
    </div>
    <div class="stat">
      <span class="stat-value" id="timer-display">60</span>
      <span class="stat-label">SEC</span>
    </div>
    <div class="stat">
      <span class="stat-value" id="errors-display">0</span>
      <span class="stat-label">ERRORS</span>
    </div>
  </div>
 
  <!-- PROGRESS BAR -->
  <div class="progress-track">
    <div class="progress-fill" id="progress-fill"></div>
  </div>
 
  <!-- MAIN GAME AREA -->
  <main class="game-area">
    <div class="snippet-wrapper">
      <div class="snippet-display" id="snippet-display"></div>
    </div>
    <input
      type="text"
      id="typing-input"
      class="typing-input"
      autocomplete="off"
      autocorrect="off"
      autocapitalize="off"
      spellcheck="false"
      aria-label="Type the code snippet here"
    />
    <div class="focus-prompt" id="focus-prompt">
      <span class="focus-icon">&#9654;</span>
      <span>Click to focus &amp; start typing</span>
    </div>
  </main>
 
  <!-- FOOTER -->
  <footer class="footer">
    Built with vanilla JS &nbsp;·&nbsp;
    <a href="https://github.com/abinaya-arjunan/codetype-racer" target="_blank" rel="noopener">View on GitHub</a>
  </footer>
 
  <!-- RESULTS SCREEN -->
  <div class="results-overlay hidden" id="results-overlay">
    <div class="results-card">
      <h2 class="results-title">Round Complete</h2>
      <p class="result-msg" id="result-msg"></p>
 
      <div class="results-stats">
        <div class="result-item">
          <span class="result-value" id="result-wpm">0</span>
          <span class="result-label">WPM</span>
        </div>
        <div class="result-item">
          <span class="result-value" id="result-acc">0</span>
          <span class="result-label">Accuracy</span>
        </div>
        <div class="result-item">
          <span class="result-value" id="result-errors">0</span>
          <span class="result-label">Errors</span>
        </div>
      </div>
 
      <div class="leaderboard-section">
        <div class="lb-header">
          <h3 class="lb-title">TOP SCORES</h3>
          <button class="clear-btn" id="clear-scores-btn">Clear</button>
        </div>
        <ol class="leaderboard-list" id="leaderboard-list"></ol>
      </div>
 
      <button class="restart-btn" id="restart-btn">Try Again &nbsp;↩</button>
      <p class="hint-text">or press <kbd>Esc</kbd> anytime to restart</p>
    </div>
  </div>
 
  <script src="snippets.js"></script>
  <script src="timer.js"></script>
  <script src="leaderboard.js"></script>
  <script src="app.js"></script>
</body>
</html>
